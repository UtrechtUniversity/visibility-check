---
topics:
  - id: 1
    name: Research Profiles
  - id: 2
    name: Academic Social Networks
  - id: 3
    name: Personal Channels
  - id: 4
    name: Open Access
  - id: 5
    name: Planning


questions:
  - url: planning
    type: radio
    topic_id: 5
    text: What is your view, as a researcher, on the need for an online presence?
    linktext:
    linkurl:
    options:
      - value: 'yes'
        label: I need one and want it to be complete
      - value: 'no'
        label: I believe I dont need one
      - value: why
        label: I need one but dont want to spend time on it
  - url: institutional-profile
    type: radio
    topic_id: 1
    text: I have set up and customised my institutional profile page for example at
      UU or UMCU.
    linktext: institutional profile
    linkurl:
    options:
      - value: 'yes'
        label: 'Yes'
      - value: 'no'
        label: 'No'
      - value: alongtimeago
        label: A long time ago
      - value: nonotyet
        label: Not sure if I have
  - url: orcid
    type: radio
    topic_id: 1
    text: I have an ORCID ID
    linktext: ORCID ID
    linkurl:
    options:
      - value: 'yes'
        label: 'Yes'
      - value: 'no'
        label: 'No'
      - value: yesandaddedsomelinks
        label: Yes and added some links
      - value: yesandsetupalllinksandaddedabio
        label: Yes and set up all links and added a bio
  - url: research-profiles
    type: checkbox
    topic_id: 1
    text: I have these research profiles
    linktext: research profiles
    linkurl:
    options:
      - value: 'googlescholarid '
        label: 'Google Scholar ID '
      - value: researcherid
        label: ResearcherID
      - value: scopusid
        label: Scopus Author ID
      - value: other
        label: Other
      - value: publons
        label: Publons
  - url: up-to-date-profiles
    type: radio
    topic_id: 1
    text: I make sure my profiles are up to date.
    linktext:
    linkurl:
    options:
      - value: 'yes'
        label: 'Yes'
      - value: 'no'
        label: 'No'
  - url: profiles-reference
    type: radio
    topic_id: 1
    text: All my profiles refer to each other
    linktext:
    linkurl:
    options:
      - value: 'yes'
        label: 'Yes'
      - value: 'no'
        label: 'No'
      - value: some
        label: Some
      - value: none
        label: None
  - url: academic-social-networks
    type: checkbox
    topic_id: 2
    text: I have an account on these academic social networks
    linktext:
    linkurl:
    options:
      - value: academia
        label: Academia.edu
      - value: researchgate
        label: Researchgate
      - value: other
        label: Other
      - value: humanitiescommons
        label: HumanitiesCommons
  - url: social-media
    type: checkbox
    topic_id: 3
    text: I have these social media accounts and/or channels
    linktext:
    linkurl:
    options:
      - value: linkedin
        label: LinkedIn
      - value: twitter
        label: Twitter and or Mastodon
      - value: website
        label: Personal website or Blog
      - value: youtube
        label: Youtube Channel
      - value: other
        label: TikTok Insta or similar
      - value: other
        label: Other
  - url: post-messages
    type: radio
    topic_id: 3
    text: I post new messages about my research at least three times per year in my
      social media accounts
    linktext:
    linkurl:
    options:
      - value: 'yes'
        label: 'Yes'
      - value: 'no'
        label: 'No'
  - url: valorization
    type: checkbox
    topic_id: 3
    text: I try to foster societal engagement with my research by …
    linktext:
    linkurl:
    options:
      - value: 'yes'
        label: posting on non academic venues blogs ets
      - value: 'no'
        label: appearing in media like tv or radio
      - value: sometimes
        label: creating video
      - value: creatingpodcasts
        label: creating podcasts
      - value: providingplainlanguageaccountsofmyresearch
        label: providing plain language accounts of my research
  - url: open-access
    type: checkbox
    topic_id: 4
    text: 'I share the following output from my research:'
    linktext:
    linkurl:
    options:
      - value: articles
        label: Articles or books
      - value: books
        label: Data Code and Software
      - value: research-data
        label: Posters Presentations or Conf Abstracts
      - value: research-code
        label: Preprints
  - url: doi
    type: checkbox
    topic_id: 4
    text: 'I try to ensure my (research) ouput has:'
    linktext:
    linkurl:
    options:
      - value: 'yes'
        label: A persistent identifier
      - value: 'no'
        label: An open reuse license
      - value: dontknow
        label: A plain language summary
  - url: interactions
    type: checkbox
    topic_id: 5
    text: 'I actively keep track of interactions with my output by looking at:'
    linktext:
    linkurl:
    options:
      - value: citationdata
        label: Citation data
      - value: downloadsorreaders
        label: Downloads or Readers
      - value: mentionsinmediaaltmetrics
        label: Mentions in media Altmetrics
      - value: qualitativefeedbackviadirectrepliesandcommentsonandoffline
        label: Qualitative feedback via direct replies and comments on and offline
